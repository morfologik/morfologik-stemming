name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21 (test toolchain)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Set up JDK 17 (build)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn --batch-mode verify
